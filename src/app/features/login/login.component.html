<div class="login-container">

  <div class="login-card">

    <h1>🔐 Acceso Admin</h1>

    <p>Panel privado de Taller Reyes Polo</p>
    
    <input
      type="text"
      placeholder="Usuario"
      [(ngModel)]="usuario"
    />

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
    />

    <button (click)="login()">
      Ingresar
    </button>

    <div *ngIf="error" class="error">
      {{ error }}
    </div>

  </div>

</div>
